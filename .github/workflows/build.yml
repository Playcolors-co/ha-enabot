name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build add-on image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: [ebo_air2]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.addon }} (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.addon }}
          file: ./${{ matrix.addon }}/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            BUILD_FROM=docker.io/library/python:3.11-slim
